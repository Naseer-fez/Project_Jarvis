[PATHS]
data_root = D:\AI\Jarvis\data
whisper_cache = D:\AI\Jarvis\data\whisper
piper_model_dir = D:\AI\Jarvis\data\piper
porcupine_keyword_path = D:\AI\Jarvis\data\porcupine\jarvis_windows.ppn

[WAKE_WORD]
# Get your free AccessKey at https://console.picovoice.ai/
access_key = YOUR_PORCUPINE_ACCESS_KEY_HERE
sensitivity = 0.5
# Microphone device index — run list_audio_devices.py to find yours (-1 = default)
microphone_index = -1

[STT]
# Options: tiny.en, base.en, small.en, medium.en, large-v3
model_size = base.en
language = en
record_timeout_seconds = 8
silence_threshold_seconds = 1.5
# Dynamic energy: multiplier over ambient RMS to detect speech onset
energy_multiplier = 2.5
sample_rate = 16000
channels = 1

[TTS]
# Piper voice model — download from https://huggingface.co/rhasspy/piper-voices
voice_model = en_US-lessac-medium
speaker_id = 0
# Playback device index (-1 = default)
output_device_index = -1

[HARDWARE]
com_port = COM7
baud_rate = 115200
timeout_seconds = 2
# Set to True to require real hardware (will crash if not found)
require_hardware = False

[LOGGING]
level = INFO
log_file = D:\AI\Jarvis\data\logs\jarvis.log
