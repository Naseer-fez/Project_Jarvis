# ============================================================
#  ADD THIS SECTION TO YOUR EXISTING  config/jarvis.ini
# ============================================================
#
#  Every path below is relative to the project root
#  (D:\AI\Jarvis).  Use forward slashes or double back-slashes.
# ============================================================

[voice]

# ── Master switch ─────────────────────────────────────────────
# Set to true to enable the voice layer on startup.
enabled = false

# ── Wake-word (Porcupine) ─────────────────────────────────────
# Free API key from https://console.picovoice.ai/
porcupine_access_key = PASTE_YOUR_FREE_KEY_HERE

# Built-in keyword to listen for.
# Options (built-in, no extra file needed):
#   jarvis | hey google | ok google | hey siri | alexa | computer
porcupine_keyword = jarvis

# (Optional) Path to a custom .ppn wake-word model.
# Leave empty to use the built-in keyword above.
porcupine_model_path =

# ── Speech-to-Text (Whisper) ──────────────────────────────────
# Model name.  Recommended: base.en  or  small.en
#   tiny.en  ~39 MB  – fastest, lower accuracy
#   base.en  ~74 MB  – good balance  (DEFAULT)
#   small.en ~244 MB – better accuracy, ~2× slower
# Do NOT use large-v2 / large-v3 on a local machine without a GPU.
whisper_model = base.en

# Directory where Whisper model files are cached / pre-downloaded.
# If you already have data/whisper/small.pt, point here and rename
# or change whisper_model = small.en accordingly.
whisper_model_dir = data/whisper

# Language hint for Whisper (speeds up transcription).
stt_language = en

# ── Text-to-Speech (Piper) ────────────────────────────────────
# ONNX voice model (already on disk in your project).
piper_model_path  = data/voices/en_US-lessac-medium.onnx
piper_config_path = data/voices/en_US-lessac-medium.onnx.json

# ── Audio devices ─────────────────────────────────────────────
# Set to -1 to auto-detect the system default.
# To use a specific device run:
#   python -c "import sounddevice; print(sounddevice.query_devices())"
# and paste the numeric index here.
input_device_index  = -1
output_device_index = -1

# ── Misc ──────────────────────────────────────────────────────
# Sample rate used for microphone capture (Hz).
# Porcupine requires 16000; do not change this.
sample_rate = 16000
