<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <div class="login-layout">
    <div class="login-card">
      <div class="login-card-inner">

        <div class="login-logo">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f0ff"/>
                <stop offset="100%" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
            <polygon points="24,2 44,14 44,34 24,46 4,34 4,14"
                     stroke="url(#logo-grad)" stroke-width="2" fill="none"/>
            <polygon points="24,8 38,16 38,32 24,40 10,32 10,16"
                     stroke="url(#logo-grad)" stroke-width="1.2" fill="none" opacity="0.5"/>
            <circle cx="24" cy="24" r="6"
                    fill="url(#logo-grad)" opacity="0.8"/>
          </svg>
        </div>

        <h1 class="login-title">JARVIS</h1>
        <p class="login-subtitle">System Authentication Required</p>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="form-group">
            <label class="form-label" for="username">USERNAME</label>
            <input class="form-input" type="text" name="username" id="username"
                   required autofocus autocomplete="username">
          </div>

          <div class="form-group">
            <label class="form-label" for="password">PASSWORD</label>
            <input class="form-input" type="password" name="password" id="password"
                   required autocomplete="current-password">
          </div>

          <button class="btn btn-accent btn-full" type="submit">AUTHENTICATE</button>
        </form>

        <div class="login-footer">
          <span class="ws-dot"></span> System Online
        </div>

      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
